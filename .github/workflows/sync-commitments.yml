name: Sync Commitments & Refresh Report

on:
  push:
    paths:
      - 'commitments.json'

permissions:
  contents: write

jobs:
  sync-and-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run refresh script
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: python refresh_ga_target_1e.py

      - name: Copy output to index.html
        run: cp GA_Target_View.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Auto-refresh: sync commitment changes" && git push)
